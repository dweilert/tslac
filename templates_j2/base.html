<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>{{ title or "Newsletter Helper" }}</title>
    <style>
        /* Keep your existing CSS in templates.py for now.
        Later we’ll move to static/app.css. */
    </style>

    <link rel="stylesheet" href="/static/css/app.css">

    {% if page_css %}
    <link rel="stylesheet" href="{{ page_css }}">
    {% endif %}

    {% block head_extra %}{% endblock %}

</head>
<body>
  <div class=""wrap"></div>
    {% if status %}
        <div style="margin: 10px 0; padding: 8px 10px; background: #fff3cd; border: 1px solid #ffeeba;">
        {{ status }}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
