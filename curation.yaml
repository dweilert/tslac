https://www.tsl.texas.gov/tbp/authortalks:
  excerpts:
  - 'Join the Talking Book Program for an author talk on Tuesday, February 24 at 7:00
    p.m. (Central) with author Char Miller.

    Reader’s Advisory Librarian Laura Jean will discuss his career and his book, SAN
    ANTONIO: A TRICENTENNIAL HISTORY. Following the talk, there will be a Q&A session.'
  - 'SAN ANTONIO: A TRICENTENNIAL HISTORY by Char Miller (DBC 18818)'
  - historians believe San Antonio may be the most fought-over city in U.S. history—it
    is perhaps most celebrated for the iconic 1836 Battle of the Alamo. The city is
    also home to four beautifully restored Spanish missions, which in 2015 UNESCO
    designated a World Heritage Site and have become integral to San Antonio's robust
    tourist economy along with the fabled River Walk. Some violence. 2018.
  updated_at: '2026-02-22T15:20:18'
