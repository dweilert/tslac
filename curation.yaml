  - 'Free Professional Development Opportunities

    The Texas Historical Records Advisory Board (THRAB) presents FREE professional
    development opportunities for archivists, librarians, and other staff members
    in Texas archival repositories in fulfillment of its initiative to support continuing
    education and training for those working to preserve and provide access to the
    historical record of Texas.


    If you would like to be added to our mailing list, visit: Newsletter


    Funding provided by the National Historical Publications and Records Commission
    (NHPRC).'
