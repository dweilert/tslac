web:https://www.tsl.texas.gov/node/70513:
  excerpts:
  - "Jessica Brannon-Wranosky, Distinguished Professor of Digital Humanities and History\
    \ at East Texas A&M University, will share stories of Texas women who fought for\
    \ the right to vote when she visits the Sam Houston Center. Her research on women’s\
    \ suffrage has been featured in numerous publications, as a Texas Standard radio\
    \ series and on PBS.  \r\n\r\nThe public is invited to learn more about the strategic\
    \ role Texas women had in the national suffrage movement and view a select screening\
    \ from the Citizens at Last: Texas Women Fight for the Vote documentary series\
    \ Brannon-Wranoksy co-produced. In addition, visitors can experience a special\
    \ display of historic items related to women’s suffrage from the collections of\
    \ the Sam Houston Center and the Texas State Library and Archives Commission in\
    \ Austin."
  updated_at: '2026-03-06T10:27:02'
  final_blurb: '<p>Jessica Brannon-Wranosky, Distinguished Professor of Digital Humanities
    and History at East Texas A&amp;M University, will share stories of Texas women
    who fought for the right to vote when she visits the Sam Houston Center. Her research
    on women&rsquo;s suffrage has been featured in numerous publications, as a Texas
    Standard radio series and on PBS. &nbsp; The public is invited to learn more about
    the strategic role Texas women had in the national suffrage movement and view
    a select screening from the Citizens at Last: Texas Women Fight for the Vote documentary
    series Brannon-Wranoksy co-produced. In addition, visitors can experience a special
    display of historic items related to women&rsquo;s suffrage from the collections
    of the Sam Houston Center and the Texas State Library and Archives Commission
    in Austin.</p>'
  title: Texas Women & Right to Vote
  subtitle: ''
web:https://www.tsl.texas.gov/node/70520:
  final_blurb: <p>Bonnie Ernst, PhD, is an assistant professor in the Department of
    Criminology and Criminal Justice at Indiana University Bloomington and will conduct
    research at TSLAC in support of her project, &ldquo;Black Women and Convict Leasing
    in the Jim Crow South.&rdquo; Her research on Black women in Texas prisons at
    the turn of the twentieth century will shed light on the approach that Texas took
    and how that fits into the broader history of the American South.</p>
  updated_at: '2026-03-06T15:18:51'
  title: Texas Library and Archives Foundation Announces 2026 Research Fellowships
    in Texas History at State Archives | Texas State Library
  subtitle: ''
