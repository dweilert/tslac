  final_blurb: <p>On&nbsp;<strong>Texas Talking Book Voices</strong>, the podcast
    of the&nbsp;<a href="https://www.tsl.texas.gov/tbp">Talking Book Program</a> (TBP)
    at the Texas State Library and Archives Commission, we go behind the scenes to
    explore different facets of the service and meet the people who help make reading
    accessible to Texans with visual, physical, or reading disabilities. Whether you&rsquo;re
    a TBP patron, a librarian, or a library fan, we have something here for you!</p>
